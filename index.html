<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomy Book Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-buttons">
        <button onclick="toggleMode()" title="Toggle Theme" style="font-size: 1.3rem;">☀️</button>
    </div>

    <header>
        <h1 id="title">Astronomy Hub</h1>
        <p class="subtitle" id="subtitle">A curated reading path through the cosmos</p>
    </header>

    <div class="controls">
        <input type="text" id="search" placeholder="Search books...">
        <select id="filter">
            <option value="all">All Levels</option>
            <option value="Beginner">Beginner</option>
            <option value="Intro">Introductory</option>
            <option value="Intermediate">Intermediate</option>
            <option value="AdvancedHS">Advanced High School</option>
            <option value="Advanced">Advanced / University</option>
            <option value="Research">Research</option>
            <option value="Pop">Pop Science</option>
            <option value="History">History</option>
            <option value="Physics">Physics</option>
            <option value="Relativity">Relativity</option>
            <option value="Quantum">Quantum Mechanics</option>
            <option value="Particle">Particle Physics</option>
        </select>
    </div>

    <p class="book-count" id="bookCount"></p>

    <div class="grid" id="grid"></div>

    <div class="modal" id="modal" onclick="closeModalOutside(event)" role="dialog" aria-modal="true">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
